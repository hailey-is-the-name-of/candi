<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대구 인구구성 통계 · popu2</title>
  <meta name="description" content="대구광역시 및 각 구·군의 20세 이상 인구 구성 통계 페이지" />
  <style>
    :root {
      --bg: #0b1020;
      --bg-soft: rgba(255,255,255,0.06);
      --panel: rgba(15, 23, 42, 0.76);
      --panel-strong: rgba(12, 19, 35, 0.92);
      --line: rgba(255,255,255,0.1);
      --text: #eef2ff;
      --muted: #a7b1c7;
      --accent: #7dd3fc;
      --accent-2: #c4b5fd;
      --male: linear-gradient(90deg, #38bdf8, #60a5fa);
      --female: linear-gradient(90deg, #f0abfc, #c084fc);
      --shadow: 0 20px 60px rgba(0,0,0,0.28);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --max: 1320px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, "Pretendard", "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.2), transparent 28%),
        radial-gradient(circle at top right, rgba(196, 181, 253, 0.18), transparent 24%),
        linear-gradient(180deg, #0b1020 0%, #090d18 100%);
      min-height: 100vh;
      line-height: 1.5;
    }

    a { color: inherit; text-decoration: none; }
    .page {
      width: min(calc(100% - 24px), var(--max));
      margin: 0 auto;
      padding: 28px 0 64px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(17,24,39,0.88), rgba(15,23,42,0.76));
      border: 1px solid var(--line);
      border-radius: 32px;
      padding: 32px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -80px -120px auto;
      width: 260px;
      height: 260px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(125,211,252,0.35), transparent 70%);
      pointer-events: none;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 24px;
      align-items: end;
    }

    .eyebrow {
      margin: 0 0 10px;
      font-size: 12px;
      letter-spacing: 0.18em;
      color: var(--accent);
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3.8vw, 42px);
      line-height: 1.12;
      letter-spacing: -0.03em;
      word-break: keep-all;
    }

    .hero p {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: clamp(14px, 1.8vw, 17px);
      max-width: 760px;
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .stat-box {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 18px;
      min-height: 110px;
    }

    .stat-box span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }

    .stat-box strong {
      display: block;
      font-size: clamp(22px, 3vw, 34px);
      letter-spacing: -0.02em;
    }

    .quick-nav {
      position: sticky;
      top: 14px;
      z-index: 10;
      margin: 22px 0 28px;
      border: 1px solid var(--line);
      background: rgba(11, 16, 32, 0.78);
      backdrop-filter: blur(16px);
      border-radius: 999px;
      padding: 10px;
      overflow-x: auto;
      white-space: nowrap;
      box-shadow: 0 14px 40px rgba(0,0,0,0.18);
      scrollbar-width: none;
    }
    .quick-nav::-webkit-scrollbar { display: none; }

    .nav-track {
      display: inline-flex;
      gap: 10px;
      min-width: 100%;
    }

    .nav-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 11px 16px;
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255,255,255,0.04);
      border: 1px solid transparent;
      font-size: 14px;
      font-weight: 600;
      transition: 0.2s ease;
    }

    .nav-pill:hover {
      color: var(--text);
      border-color: rgba(125,211,252,0.28);
      background: rgba(125,211,252,0.08);
      transform: translateY(-1px);
    }

    .sections {
      display: grid;
      gap: 22px;
    }

    .district-card {
      width: 100%;
      max-width: 100%;
      overflow: hidden;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(15,23,42,0.92), rgba(11,16,32,0.92));
      border-radius: var(--radius-xl);
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .district-head {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .district-head h2 {
      margin: 0;
      font-size: clamp(24px, 3vw, 34px);
      letter-spacing: -0.03em;
    }

    .muted {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .kpi-wrap {
      display: grid;
      grid-template-columns: repeat(3, minmax(92px, 1fr));
      gap: 12px;
      min-width: min(100%, 420px);
    }

    .kpi {
      border: 1px solid var(--line);
      background: var(--bg-soft);
      border-radius: 18px;
      padding: 14px 16px;
      text-align: right;
    }

    .kpi-label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .kpi strong {
      font-size: clamp(18px, 2vw, 24px);
      letter-spacing: -0.02em;
      display: block;
    }

    .kpi small {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .ratio-bar {
      display: flex;
      width: 100%;
      height: 12px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 8px;
    }

    .ratio-male { background: var(--male); }
    .ratio-female { background: var(--female); }

    .ratio-caption {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 18px;
    }

    .table-shell {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      overflow-y: visible;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
    }

    table {
      width: 100%;
      min-width: 0;
      table-layout: fixed;
      border-collapse: collapse;
    }

    thead th {
      position: sticky;
      top: 0;
      background: rgba(17,24,39,0.96);
      z-index: 1;
      color: #dbeafe;
      font-size: 14px;
      font-weight: 700;
      padding: 16px 18px;
      text-align: right;
      border-bottom: 1px solid var(--line);
    }

    thead th:first-child,
    tbody th {
      text-align: left;
    }

    tbody th, tbody td {
      padding: 14px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      font-size: 15px;
      vertical-align: top;
    }

    tbody td {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    tbody tr:last-child th,
    tbody tr:last-child td {
      border-bottom: 0;
    }

    tbody tr:hover {
      background: rgba(125,211,252,0.05);
    }

    .total-row {
      background: linear-gradient(90deg, rgba(125,211,252,0.08), rgba(196,181,253,0.08));
    }

    .total-row th,
    .total-row td {
      font-weight: 800;
    }

    .cell-primary {
      display: block;
      font-weight: 800;
      color: var(--text);
    }

    .cell-secondary {
      display: block;
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
    }

    .legend {
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
    }

    .footer-note {
      margin-top: 22px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 960px) {
      .hero-grid,
      .district-head {
        grid-template-columns: 1fr;
        display: grid;
      }

      .hero {
        padding: 24px;
        border-radius: 26px;
      }

      .hero-stats {
        grid-template-columns: 1fr;
      }

      .kpi-wrap {
        min-width: 0;
        width: 100%;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .district-card {
        padding: 18px;
        border-radius: 24px;
      }

      .page {
        width: min(calc(100% - 16px), var(--max));
        padding-top: 16px;
        padding-bottom: 110px;
      }
    }

    @media (max-width: 640px) {
      .hero {
        padding: 18px;
      }
      h1 {
        font-size: 26px;
        line-height: 1.18;
      }
      .hero p {
        font-size: 13px;
      }
      .quick-nav {
        margin: 18px 0 22px;
        top: 10px;
        padding: 8px;
      }
      .nav-pill {
        padding: 9px 12px;
        font-size: 12px;
      }
      table {
        min-width: 0;
      }
      tbody th, tbody td, thead th {
        padding: 10px 8px;
        font-size: 12px;
        word-break: keep-all;
      }
      .stat-box {
        padding: 16px;
        min-height: auto;
      }
      .stat-box strong {
        font-size: 24px;
      }
      .district-head h2 {
        font-size: 22px;
      }
      .ratio-caption {
        gap: 8px;
        flex-direction: column;
      }
    }
  
    @media (max-width: 640px) {
      .kpi-wrap {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .kpi {
        padding: 12px 10px;
      }
      .kpi strong {
        font-size: 18px;
      }
      .kpi small, .cell-secondary {
        font-size: 11px;
      }
      .cell-primary {
        font-size: 12px;
      }
    }
</style>
</head>

    function fmt(num) {
      return Number(num).toLocaleString('ko-KR');
    }

    function pct(part, whole) {
      if (!whole) return '0.00';
      return ((part / whole) * 100).toFixed(2);
    }

    function heroStat(title, primary, secondary='') {
      return `
        <div class="stat-box">
          <span>${title}</span>
          <strong>${primary}</strong>
          ${secondary ? `<small style="display:block;margin-top:8px;color:var(--muted);font-size:12px;">${secondary}</small>` : ''}
        </div>
      `;
    }

    function buildHero() {
      const daegu = populationData[0];
      const malePct = pct(daegu.male20plus, daegu.total20plus);
      const femalePct = pct(daegu.female20plus, daegu.total20plus);

      let html = '';
      html += heroStat('대구광역시 20세 이상 총인구', '100.00%', fmt(daegu.total20plus) + '명');

      html += heroStat('여성', femalePct + '%', fmt(daegu.female20plus) + '명');
      document.getElementById('heroStats').innerHTML = html;
    }

    function buildQuickNav() {

        <a class="nav-pill" href="#sec-${index}">${item.name}</a>
      `).join('');
    }

        <span class="cell-secondary">${fmt(count)}명</span>
      `;

          <td>${combinedCell(totalFemalePct, item.female20plus)}</td>
        </tr>
      `;

      const ageRows = item.ages.map(age => `
        <tr>
          <th scope="row">${age.label}</th>
          <td>${combinedCell(pct(age.total, item.total20plus), age.total)}</td>
          <td>${combinedCell(pct(age.male, item.total20plus), age.male)}</td>
          <td>${combinedCell(pct(age.female, item.total20plus), age.female)}</td>
        </tr>
      `).join('');

      return `
        <table>
          <thead>
            <tr>
              <th>구분</th>
              <th>총</th>
              <th>남</th>
              <th>여</th>
            </tr>
          </thead>
          <tbody>
            ${totalRow}
            ${ageRows}
          </tbody>
        </table>
      `;
    }

    function buildSections() {
      const html = populationData.map((item, index) => {
        const malePct = pct(item.male20plus, item.total20plus);
        const femalePct = pct(item.female20plus, item.total20plus);

        const kpiTotalPrimary = '100.00%';
        const kpiTotalSecondary = fmt(item.total20plus) + '명';

        const kpiMalePrimary = malePct + '%';
        const kpiMaleSecondary = fmt(item.male20plus) + '명';

        const kpiFemalePrimary = femalePct + '%';
        const kpiFemaleSecondary = fmt(item.female20plus) + '명';

        const tableHtml = combinedTableRows(item);
        const legend = '모든 퍼센트는 각 시군구의 20세 이상 총인구를 100% 기준으로 계산했고, 숫자는 실제 인원 수입니다.';

        return `
          <section class="district-card" id="sec-${index}">
            <div class="district-head">
              <div>
                <p class="eyebrow">DAEGU POPULATION</p>
                <h2>${item.name}</h2>
                <p class="muted">20세 이상 인구 기준 · 0~19세 제외</p>
              </div>
              <div class="kpi-wrap">
                <div class="kpi">
                  <span class="kpi-label">총</span>
                  <strong>${kpiTotalPrimary}</strong>
                  <small>${kpiTotalSecondary}</small>
                </div>
                <div class="kpi">
                  <span class="kpi-label">남</span>
                  <strong>${kpiMalePrimary}</strong>
                  <small>${kpiMaleSecondary}</small>
                </div>
                <div class="kpi">
                  <span class="kpi-label">여</span>
                  <strong>${kpiFemalePrimary}</strong>
                  <small>${kpiFemaleSecondary}</small>
                </div>
              </div>
            </div>

            <div class="ratio-bar" aria-hidden="true">
              <span class="ratio-male" style="width:${malePct}%"></span>
              <span class="ratio-female" style="width:${femalePct}%"></span>
            </div>
            <div class="ratio-caption">
              <span>남성 ${malePct}% · ${fmt(item.male20plus)}명</span>
              <span>여성 ${femalePct}% · ${fmt(item.female20plus)}명</span>
            </div>

            <div class="table-shell">
              ${tableHtml}
            </div>

            <div class="legend">${legend}</div>
          </section>
        `;
      }).join('');

      document.getElementById('sections').innerHTML = html;
    }

    buildQuickNav();
    buildHero();
    buildSections();
  </script>
</body>
</html>
