<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대구광역시당 안내</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: rgba(255, 255, 255, 0.9);
      --card-hover: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: rgba(17, 24, 39, 0.08);
      --shadow: 0 14px 40px rgba(17, 24, 39, 0.08);
      --shadow-hover: 0 18px 46px rgba(17, 24, 39, 0.12);
      --accent: #2563eb;
      --accent-soft: rgba(37, 99, 235, 0.08);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.08), transparent 32%),
        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.06), transparent 28%),
        var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 36px 20px;
    }

    .wrap {
      width: 100%;
      max-width: 980px;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .logo-box {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      padding: 10px 0;
    }

    .logo-box img {
      width: 200px;
      max-width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 10px 25px rgba(0, 0, 0, 0.08));
    }

    .title-area {
      text-align: center;
      margin-top: 4px;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .title-area h1 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      line-height: 1.2;
      letter-spacing: -0.03em;
      font-weight: 800;
    }

    .title-area p {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    .grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px;
      margin-top: 10px;
    }

    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 220px;
      padding: 28px 24px;
      border-radius: var(--radius);
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      text-decoration: none;
      color: inherit;
      overflow: hidden;
      backdrop-filter: blur(10px);
      transition: transform 0.24s ease, box-shadow 0.24s ease, background-color 0.24s ease, border-color 0.24s ease;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.08), transparent 48%);
      opacity: 0;
      transition: opacity 0.24s ease;
      pointer-events: none;
    }

    .card:hover,
    .card:focus-visible {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      background: var(--card-hover);
      border-color: rgba(37, 99, 235, 0.18);
      outline: none;
    }

    .card:hover::before,
    .card:focus-visible::before {
      opacity: 1;
    }

    .card-top {
      position: relative;
      z-index: 1;
    }

    .card-index {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .card h2 {
      margin: 0;
      font-size: clamp(1.25rem, 2vw, 1.55rem);
      line-height: 1.35;
      letter-spacing: -0.02em;
      white-space: pre-line;
    }

    .card-bottom {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid rgba(17, 24, 39, 0.08);
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 600;
    }

    .arrow {
      font-size: 1.15rem;
      color: var(--accent);
      transition: transform 0.24s ease;
    }

    .card:hover .arrow,
    .card:focus-visible .arrow {
      transform: translateX(4px);
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .card {
        min-height: 180px;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 24px 14px;
      }

      .hero {
        gap: 22px;
      }

      .logo-box img {
        width: 200px;
      }

      .title-area p {
        font-size: 0.96rem;
      }

      .card {
        padding: 24px 20px;
        border-radius: 20px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="logo-box">
        <img src="http://182.227.19.5:4559/static/images/logo.png" alt="로고" />
      </div>

      <div class="title-area">
        <h1>공천관리위원회 안내 페이지</h1>
      </div>

      <div class="grid">
        <a class="card" href="https://daegu2026.theminjoo.kr/" target="_blank" rel="noopener noreferrer">
          <div class="card-top">
            <div class="card-index">01</div>
            <h2>공직선거후보자
공천관리 시스템</h2>
          </div>
          <div class="card-bottom">
            <span>바로가기</span>
            <span class="arrow">→</span>
          </div>
        </a>

        <a class="card" href="http://182.227.19.5:4558/" target="_blank" rel="noopener noreferrer">
          <div class="card-top">
            <div class="card-index">02</div>
            <h2>예비후보자
등록현황</h2>
          </div>
          <div class="card-bottom">
            <span>바로가기</span>
            <span class="arrow">→</span>
          </div>
        </a>

        <a class="card" href="http://182.227.19.5:6510/" target="_blank" rel="noopener noreferrer">
          <div class="card-top">
            <div class="card-index">03</div>
            <h2>대구광역시
득표 비교</h2>
          </div>
          <div class="card-bottom">
            <span>바로가기</span>
            <span class="arrow">→</span>
          </div>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
